name: release

# Tag a version to ship binaries:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Builds (cross-compiling musl/aarch64 via `cross` automatically), packages
      # `bohay-<tag>-<target>.{tar.gz,zip}` + a .sha256, and attaches them to the
      # GitHub Release for this tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: bohay
          target: ${{ matrix.target }}
          archive: bohay-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
